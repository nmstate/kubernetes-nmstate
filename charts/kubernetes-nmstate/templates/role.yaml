---
# Role (namespaced) — from deploy/operator/role.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nmstate-operator
  namespace: {{ include "kubernetes-nmstate.operatorNamespace" . }}
  labels:
    {{- include "kubernetes-nmstate.labels" . | nindent 4 }}
rules:
- apiGroups:
  - apps
  resources:
  - daemonsets
  - deployments
  - replicasets
  - statefulsets
  verbs:
  - '*'
- apiGroups:
  - policy
  resources:
  - poddisruptionbudgets
  verbs:
  - '*'
