---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: nmstate-operator
  namespace: {{ include "kubernetes-nmstate.operatorNamespace" . }}
  labels:
    {{- include "kubernetes-nmstate.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: nmstate-operator
  namespace: {{ include "kubernetes-nmstate.operatorNamespace" . }}
roleRef:
  kind: Role
  name: nmstate-operator
  apiGroup: rbac.authorization.k8s.io
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: nmstate-operator
  labels:
    {{- include "kubernetes-nmstate.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: nmstate-operator
  namespace: {{ include "kubernetes-nmstate.operatorNamespace" . }}
roleRef:
  kind: ClusterRole
  name: nmstate-operator
  apiGroup: rbac.authorization.k8s.io
