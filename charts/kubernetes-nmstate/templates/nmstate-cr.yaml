{{- if .Values.nmstateCR.create }}
---
# NMState singleton CR — triggers the operator to deploy the handler DaemonSet.
# CRDs are guaranteed installed first via the crds sub-chart's crds/ directory.
apiVersion: nmstate.io/v1
kind: NMState
metadata:
  name: nmstate
  labels:
    {{- include "kubernetes-nmstate.labels" . | nindent 4 }}
{{- if .Values.nmstateCR.nodeSelector }}
spec:
  nodeSelector:
    {{- toYaml .Values.nmstateCR.nodeSelector | nindent 4 }}
{{- end }}
{{- end }}
