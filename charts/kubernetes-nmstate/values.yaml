# Default values for kubernetes-nmstate.
# All image defaults mirror the Makefile defaults and Tiltfile configuration.

# -- Operator component (runs as a Deployment, cluster-scoped)
operator:
  image:
    # IMAGE_REGISTRY / IMAGE_REPO / OPERATOR_IMAGE_NAME / OPERATOR_IMAGE_TAG
    registry: quay.io
    repository: nmstate/kubernetes-nmstate-operator
    tag: latest
    pullPolicy: IfNotPresent
  # OPERATOR_NAMESPACE / HANDLER_NAMESPACE (default: nmstate)
  namespace: nmstate
  resources:
    requests:
      cpu: "60m"
      memory: "30Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  env:
    # ENABLE_PROFILER env var passed to operator container
    enableProfiler: "False"
    # PROFILER_PORT env var
    profilerPort: "6060"
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 10
          preference:
            matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
  # Additional pod annotations
  podAnnotations:
    target.workload.openshift.io/management: |
      {"effect": "PreferredDuringScheduling"}

# -- Handler component (deployed as a DaemonSet *by the operator*, not by Helm directly)
#    These values are passed to the operator as environment variables so it knows
#    which handler image to deploy and where.
handler:
  image:
    # IMAGE_REGISTRY / IMAGE_REPO / HANDLER_IMAGE_NAME / HANDLER_IMAGE_TAG
    registry: quay.io
    repository: nmstate/kubernetes-nmstate-handler
    tag: latest
    pullPolicy: IfNotPresent
  # HANDLER_NAMESPACE — defaults to operator.namespace when empty
  namespace: ""

# -- kube-rbac-proxy image (KUBE_RBAC_PROXY_IMAGE in Makefile)
kubeRBACProxy:
  image: quay.io/openshift/origin-kube-rbac-proxy:4.10.0

# -- MONITORING_NAMESPACE
monitoringNamespace: monitoring

# -- CRD management
#    true  → CRDs are placed in the special crds/ directory (auto-installed by Helm)
#    The 4 nmstate.io CRDs are always shipped in charts/kubernetes-nmstate/crds/
crds:
  install: true

# -- Optionally create the NMState singleton CR after the operator is ready.
#    Mirrors the TILT_ENABLE_HANDLER / enable_handler behaviour in the Tiltfile.
#    When false the operator is deployed but does not configure any nodes until
#    an NMState CR is created separately.
nmstateCR:
  create: false
  # Optional node selector for the handler DaemonSet (spec.nodeSelector)
  nodeSelector: {}

# -- Image pull secrets
imagePullSecrets: []

# -- Helm name overrides
nameOverride: ""
fullnameOverride: ""
