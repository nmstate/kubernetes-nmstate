operator:
  # Operator image. When empty, defaults to
  # quay.io/nmstate/kubernetes-nmstate-operator:<appVersion>.
  image: ""
  pullPolicy: IfNotPresent

handler:
  # Handler image the operator deploys. When empty, defaults to
  # quay.io/nmstate/kubernetes-nmstate-handler:<appVersion>.
  image: ""
  pullPolicy: IfNotPresent
  # Namespace the operator deploys the handler into (created by the operator).
  namespace: nmstate

monitoring:
  namespace: monitoring

kubeRbacProxy:
  image: quay.io/openshift/origin-kube-rbac-proxy:4.10.0

# Emit a Namespace object for the release namespace. Used by the manifest
# rendering pipeline; helm users should rely on `helm install
# --create-namespace` instead.
createNamespace: false

nmstate:
  # Create an NMState custom resource at install time, triggering deployment
  # of the kubernetes-nmstate handler.
  enabled: true
  name: nmstate
  # Passthrough for NMState .spec fields (nodeSelector, tolerations,
  # infraNodeSelector, infraTolerations, ...).
  spec: {}
