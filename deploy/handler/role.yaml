{{define "handlerPrefix"}}{{with $prefix := .HandlerPrefix}}{{$prefix | printf "%s-"}}{{end -}}{{end}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  creationTimestamp: null
  name: {{template "handlerPrefix" .}}nmstate-handler
  namespace: {{ .HandlerNamespace }}
rules:
- apiGroups:
  - ""
  resources:
  - services
  - endpoints
  - persistentvolumeclaims
  - events
  - configmaps
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - get
  - list
  - create
  - update
- apiGroups:
  - apps
  resources:
  - deployments
  - daemonsets
  - replicasets
  - statefulsets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resourceNames:
  - nmstate-handler
  resources:
  - deployments/finalizers
  verbs:
  - update
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - create
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{template "handlerPrefix" .}}nmstate-monitor
  namespace: {{ .HandlerNamespace }}
rules:
- apiGroups:
  - ""
  resources:
  - services
  - endpoints
  - pods
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  creationTimestamp: null
  name: {{template "handlerPrefix" .}}nmstate-handler
  namespace: {{ .HandlerNamespace }}
rules:
# Webhooks: cert-manager reads and updates CA bundles on mutating webhooks.
# Validating webhooks are only watched, never written.
- apiGroups:
  - admissionregistration.k8s.io
  resources:
  - mutatingwebhookconfigurations
  verbs:
  - get
  - list
  - watch
  - update
- apiGroups:
  - admissionregistration.k8s.io
  resources:
  - validatingwebhookconfigurations
  verbs:
  - get
  - list
  - watch
# nmstate.io: explicit resources with minimum required verbs.
# NodeNetworkState: handler creates and updates state reports.
- apiGroups:
  - nmstate.io
  resources:
  - nodenetworkstates
  verbs:
  - get
  - list
  - watch
  - create
  - update
- apiGroups:
  - nmstate.io
  resources:
  - nodenetworkstates/status
  verbs:
  - get
  - update
# NodeNetworkConfigurationPolicy: handler reads policies and updates status.
- apiGroups:
  - nmstate.io
  resources:
  - nodenetworkconfigurationpolicies
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - nmstate.io
  resources:
  - nodenetworkconfigurationpolicies/status
  verbs:
  - get
  - update
# NodeNetworkConfigurationEnactment: handler creates, deletes, and updates status.
- apiGroups:
  - nmstate.io
  resources:
  - nodenetworkconfigurationenactments
  verbs:
  - get
  - list
  - watch
  - create
  - delete
- apiGroups:
  - nmstate.io
  resources:
  - nodenetworkconfigurationenactments/status
  verbs:
  - get
  - update
# Nodes: handler only reads node objects for selectors and state reporting.
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - get
  - list
  - watch
# Namespaces: handler only reads the default namespace as an API connectivity probe.
- apiGroups:
  - ""
  resources:
  - namespaces
  resourceNames:
  - default
  verbs:
  - get
# Auth delegation for the webhook server.
- apiGroups:
  - authentication.k8s.io
  resources:
  - tokenreviews
  verbs:
  - create
- apiGroups:
  - authorization.k8s.io
  resources:
  - subjectaccessreviews
  verbs:
  - create
{{- if .IsOpenShift }}
- apiGroups:
  - security.openshift.io
  resourceNames:
  - privileged
  resources:
  - securitycontextconstraints
  verbs:
  - use
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{template "handlerPrefix" .}}nmstate-handler-events
  namespace: default
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - 'create'
