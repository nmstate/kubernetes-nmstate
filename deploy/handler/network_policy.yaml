{{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-metrics-ingress-8443
  namespace: {{ .HandlerNamespace }}
spec:
  podSelector:
    matchLabels:
      app: kubernetes-nmstate
      component: kubernetes-nmstate-metrics
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .MonitoringNamespace }}
    ports:
    - protocol: TCP
      port: 8443
  policyTypes:
  - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-metrics-ingress-443
  namespace: {{ .HandlerNamespace }}
spec:
  podSelector:
    matchLabels:
      app: kubernetes-nmstate
      component: kubernetes-nmstate-metrics
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .MonitoringNamespace }}
      ports:
        - protocol: TCP
          port: 443
  policyTypes:
    - Ingress
---
# Webhook ingress: kube-apiserver calls webhooks from hostNetwork.
# We cannot restrict by namespaceSelector because hostNetwork traffic
# originates from the node IP, not from a pod within a namespace.
# Restricting with a from: selector would break webhook functionality.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-webhook-ingress-9443
  namespace: {{ .HandlerNamespace }}
spec:
  podSelector:
    matchLabels:
      app: kubernetes-nmstate
      component: kubernetes-nmstate-webhook
  ingress:
    - ports:
        - protocol: TCP
          port: 9443
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-webhook-ingress-443
  namespace: {{ .HandlerNamespace }}
spec:
  podSelector:
    matchLabels:
      app: kubernetes-nmstate
      component: kubernetes-nmstate-webhook
  ingress:
    - ports:
        - protocol: TCP
          port: 443
  policyTypes:
    - Ingress
