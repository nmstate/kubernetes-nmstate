# kubernetes-nmstate test cluster
# kcli plan for RKE2 with spare NICs (eth1, eth2) for nmstate ethernet tests
#
# Usage:
#   kcli create kube rke2 --paramfile hack/kcli/nmstate-rke2.yaml
#
# Prerequisites:
#   kcli create network -c 192.168.123.0/24 --nodhcp nmstate-spare1
#   kcli create network -c 192.168.124.0/24 --nodhcp nmstate-spare2
#
# Once cluster is up, run:
#   hack/kcli/deploy-nmstate.sh

# # Cluster identity
cluster: nmstate-test

# # Kubernetes version (RKE2)
# version: v1.29

# # Topology: 1 control-plane + 2 workers
ctlplanes: 1
workers: 2

# # VM resources
# numcpus: 4
# memory: 8192
# disk_size: 40

# Base OS image (use a recent RHEL-compatible image)
# image: fedora40

# ──────────────────────────────────────────────
# Network layout
#   net 0 → default (192.168.122.0/24) = eth0
#             cluster + management traffic
#   net 1 → nmstate-spare1             = eth1
#             spare NIC for nmstate tests (no DHCP / isolated)
#   net 2 → nmstate-spare2             = eth2
#             spare NIC for nmstate tests (no DHCP / isolated)
# ──────────────────────────────────────────────
vm_with_multiple_nics:
  nets:
    - name: default       # eth0 — primary (gets default route, cluster traffic)
    - name: nmstate-spare1 # eth1 — spare NIC, no IP by default
    - name: nmstate-spare2 # eth2 — spare NIC, no IP by default


# local:
#   keys:
#     - ~/.ssh/id_rsa        # <-- add your public key path here

# # CNI — flannel works fine without spare NICs involved
# cni: flannel

# # Extra packages to install on nodes at boot
# # (ensure NetworkManager is active so nmstate can manage eth1/eth2)
# scripts:
#   - node-setup.sh
